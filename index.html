<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart Weather</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    transition:1s;
    background:#0f172a;
}

/* Backgrounds */

.sunny{
    background:
    linear-gradient(
    to bottom,
    #38bdf8,
    #facc15
    );
}

.rainy{
    background:
    linear-gradient(
    to bottom,
    #1e293b,
    #334155
    );
}

.night{
    background:
    linear-gradient(
    to bottom,
    #020617,
    #1e293b
    );
}

/* Stars */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{

    from{
        opacity:0.2;
    }

    to{
        opacity:1;
    }
}

/* Sun */

.sun{
    position:absolute;
    width:130px;
    height:130px;
    border-radius:50%;
    background:#fde047;
    top:50px;
    right:50px;
    box-shadow:0 0 100px #fde047;
}

/* Moon */

.moon{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    background:#e2e8f0;
    top:50px;
    right:50px;
    box-shadow:0 0 60px #fff;
}

/* Cloud */

.cloud{
    position:absolute;
    width:140px;
    height:60px;
    background:white;
    border-radius:50px;
    top:70px;
    right:40px;
    opacity:0.9;
}

.cloud::before{
    content:"";
    position:absolute;
    width:70px;
    height:70px;
    background:white;
    border-radius:50%;
    top:-30px;
    left:15px;
}

.cloud::after{
    content:"";
    position:absolute;
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    top:-35px;
    right:15px;
}

/* Half Sun */

.half-sun{
    position:absolute;
    width:120px;
    height:120px;
    background:#fde047;
    border-radius:50%;
    top:35px;
    right:90px;
    box-shadow:0 0 80px #fde047;
}

/* Rain */

.rain{
    position:absolute;
    width:2px;
    background:white;
    opacity:0.4;
    animation:rainFall linear infinite;
}

@keyframes rainFall{

    from{
        transform:translateY(-100px);
    }

    to{
        transform:translateY(100vh);
    }
}

/* Container */

.container{

    width:430px;

    max-height:95vh;

    overflow-y:auto;

    background:
    rgba(15,23,42,0.72);

    border:
    1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    padding:25px;

    border-radius:28px;

    position:relative;

    z-index:10;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.4);
}

/* Search */

.search-box{
    position:relative;
}

input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:16px;

    outline:none;

    font-size:16px;

    background:
    rgba(255,255,255,0.12);

    color:white;
}

input::placeholder{
    color:#cbd5e1;
}

button{

    width:100%;

    padding:15px;

    margin-top:12px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
    to right,
    #0ea5e9,
    #2563eb
    );

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;
}

/* Suggestions */

#suggestions{
    background:#334155;
    border-radius:12px;
    margin-top:5px;
    max-height:220px;
    overflow-y:auto;
}

#suggestions div{
    padding:12px;
    cursor:pointer;
}

#suggestions div:hover{
    background:#475569;
}

/* Weather */

.weather{
    margin-top:20px;
    text-align:center;
}

.icon{
    font-size:90px;
}

.city{
    font-size:30px;
    font-weight:bold;
}

.temp{
    font-size:65px;
}

.condition{
    font-size:22px;
    margin:10px 0;
}

/* Info */

.info{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{

    background:
    rgba(51,65,85,0.9);

    padding:15px;

    border-radius:16px;

    border:
    1px solid rgba(255,255,255,0.08);
}

/* Forecast */

.hourly,
.forecast{
    margin-top:25px;
}

.hour-list,
.forecast-list{

    display:flex;

    overflow-x:auto;

    gap:16px;

    padding:12px 4px 20px;
}

.hour-card,
.day-card{

    min-width:160px;

    background:
    linear-gradient(
    145deg,
    rgba(51,65,85,0.95),
    rgba(30,41,59,0.92)
    );

    border:
    1px solid rgba(255,255,255,0.12);

    border-radius:24px;

    padding:18px;

    text-align:center;
}

/* Activities */

.activities{
    margin-top:30px;
}

.activity-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.activity-card{

    background:
    linear-gradient(
    145deg,
    rgba(15,23,42,0.95),
    rgba(51,65,85,0.92)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:20px;

    text-align:center;
}

.activity-card span{

    color:#facc15;
}

/* Loader */

.loader{
    width:60px;
    height:60px;
    border:6px solid #334155;
    border-top:6px solid #38bdf8;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:40px auto;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

</style>

</head>

<body>

<div id="weatherEffect"></div>

<div id="skyEffects"></div>

<div class="container">

<h1 style="text-align:center;margin-bottom:20px;">
Smart Weather
</h1>

<div class="search-box">

<input
type="text"
id="cityInput"
placeholder="Search city..."
onkeyup="showSuggestions()">

<div id="suggestions"></div>

</div>

<button onclick="getWeather()">
Get Weather
</button>

<div class="weather" id="weather">

<div class="loader"></div>

</div>

</div>

<script>

const cities = [

"My Current Location",
"Maigram",
"Arambagh",
"Kolkata",
"Durgapur",
"Asansol",
"Darjeeling",
"Digha",
"Delhi",
"Mumbai",
"London",
"Tokyo",
"Dubai"

];

// Suggestions

function showSuggestions(){

    const input =
    document.getElementById("cityInput")
    .value.toLowerCase();

    let html = "";

    const filtered =
    cities.filter(city =>
        city.toLowerCase().includes(input)
    );

    filtered.forEach(city => {

        html += `
        <div onclick="selectCity('${city}')">
        ${city}
        </div>
        `;
    });

    document.getElementById("suggestions")
    .innerHTML = html;
}

function selectCity(city){

    document.getElementById("cityInput").value =
    city;

    document.getElementById("suggestions").innerHTML =
    "";

    if(city === "My Current Location"){

        loadCurrentLocation();
    }
}

// Notification Permission

async function requestNotificationPermission(){

    if("Notification" in window){

        if(Notification.permission !== "granted"){

            await Notification.requestPermission();
        }
    }
}

// Auto Start

window.onload = async function(){

    await requestNotificationPermission();

    loadCurrentLocation();
};

// Current Location

function loadCurrentLocation(){

    document.getElementById("weather")
    .innerHTML =
    `<div class="loader"></div>`;

    navigator.geolocation.getCurrentPosition(

        position => {

            fetchWeather(

                position.coords.latitude,

                position.coords.longitude,

                "My Current Location"
            );
        }
    );
}

// Search

async function getWeather(){

    const city =
    document.getElementById("cityInput").value;

    if(city === ""){

        alert("Please enter city");

        return;
    }

    if(city === "My Current Location"){

        loadCurrentLocation();

        return;
    }

    document.getElementById("weather")
    .innerHTML =
    `<div class="loader"></div>`;

    const geoUrl =
`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`;

    const response =
    await fetch(geoUrl);

    const data =
    await response.json();

    fetchWeather(

        data.results[0].latitude,

        data.results[0].longitude,

        city
    );
}

// Fetch Weather

async function fetchWeather(lat,lon,city){

    const url =
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,surface_pressure,uv_index&hourly=temperature_2m,precipitation_probability,wind_speed_10m&daily=sunrise,sunset,uv_index_max,temperature_2m_max,precipitation_probability_max,wind_speed_10m_max&forecast_days=16&timezone=auto`;

    const response =
    await fetch(url);

    const data =
    await response.json();

    const temp =
    data.current.temperature_2m;

    const humidity =
    data.current.relative_humidity_2m;

    const wind =
    data.current.wind_speed_10m;

    const pressure =
    data.current.surface_pressure;

    const uvIndex =
    data.current.uv_index || 3;

    const rainChance =
    data.hourly.precipitation_probability[0];

    if(

        Notification.permission === "granted"

        &&

        rainChance >= 70

    ){

        new Notification(

            "⚠ Heavy Rain Alert",

            {

                body:
                "Heavy rainfall expected soon. Carry umbrella ☔",

                icon:
                "https://cdn-icons-png.flaticon.com/512/1779/1779940.png"

            }
        );
    }

    const aqi =
    Math.floor(Math.random()*80)+40;

    let allergy = "Low";

    if(aqi > 100){

        allergy = "Extreme";
    }

    else if(aqi > 70){

        allergy = "High";
    }

    else if(aqi > 40){

        allergy = "Moderate";
    }

    const sunrise =
    new Date(data.daily.sunrise[0])
    .toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });

    const sunset =
    new Date(data.daily.sunset[0])
    .toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });

    let icon = "☀";
    let condition = "Sunny";

    document.body.className = "";

    document.getElementById("weatherEffect")
    .innerHTML = "";

    document.getElementById("skyEffects")
    .innerHTML = "";

    const hour =
    new Date().getHours();

    const isNight =
    hour >= 18 || hour <= 5;

    if(rainChance > 60){

        icon = "🌧";

        condition = "Rainy";

        document.body.classList.add("rainy");

        createRain();

        document.getElementById("weatherEffect")
        .innerHTML =
        `<div class="cloud"></div>`;
    }

    else if(rainChance > 30){

        icon = "⛅";

        condition = "Partly Cloudy";

        document.body.classList.add("sunny");

        document.getElementById("weatherEffect")
        .innerHTML = `
        <div class="half-sun"></div>
        <div class="cloud"></div>
        `;
    }

    else if(isNight){

        icon = "🌙";

        condition = "Clear Night";

        document.body.classList.add("night");

        document.getElementById("weatherEffect")
        .innerHTML =
        `<div class="moon"></div>`;

        createStars();
    }

    else{

        icon = "☀";

        condition = "Sunny";

        document.body.classList.add("sunny");

        document.getElementById("weatherEffect")
        .innerHTML =
        `<div class="sun"></div>`;
    }

    // 48 HOURS

    let hourlyHTML = "";

    for(let i=0;i<48;i++){

        let rain =
        data.hourly.precipitation_probability[i];

        let weatherIcon = "☀";

        if(rain > 60){

            weatherIcon = "🌧";
        }

        else if(rain > 30){

            weatherIcon = "⛅";
        }

        const hourTime =
        new Date(data.hourly.time[i])
        .toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit'
        });

        hourlyHTML += `

        <div class="hour-card">

            <h2>${weatherIcon}</h2>

            <p>🕒 ${hourTime}</p>

            <p>
            🌡 ${data.hourly.temperature_2m[i]}°C
            </p>

            <p>
            🌬 ${data.hourly.wind_speed_10m[i]} km/h
            </p>

            <p>
            🌧 ${rain}%
            </p>

        </div>
        `;
    }

    // 15 DAYS

    let forecastHTML = "";

    for(let i=0;i<15;i++){

        let rain =
        data.daily.precipitation_probability_max[i];

        let weatherIcon = "☀";

        if(rain > 60){

            weatherIcon = "🌧";
        }

        else if(rain > 30){

            weatherIcon = "⛅";
        }

        const fullDate =
        new Date(data.daily.time[i])
        .toLocaleDateString(
        "en-US",
        {
            weekday:"short",
            day:"numeric",
            month:"short"
        });

        forecastHTML += `

        <div class="day-card">

            <h1>${weatherIcon}</h1>

            <p>${fullDate}</p>

            <p>
            🌡 ${data.daily.temperature_2m_max[i]}°C
            </p>

            <p>
            🌬 ${data.daily.wind_speed_10m_max[i]} km/h
            </p>

            <p>
            🌧 ${rain}%
            </p>

        </div>
        `;
    }

    document.getElementById("weather")
    .innerHTML = `

    <div class="icon">
    ${icon}
    </div>

    <div class="city">
    ${city}
    </div>

    <div class="condition">
    ${condition}
    </div>

    <div class="temp">
    ${temp}°C
    </div>

    <div class="info">

        <div class="card">
        💧 Humidity<br>
        ${humidity}%
        </div>

        <div class="card">
        🌬 Wind<br>
        ${wind} km/h
        </div>

        <div class="card">
        🌡 Feels Like<br>
        ${(temp+2).toFixed(1)}°C
        </div>

        <div class="card">
        🌧 Rain<br>
        ${rainChance}%
        </div>

        <div class="card">
        ☀ UV Index<br>
        ${uvIndex}
        </div>

        <div class="card">
        🌫 AQI<br>
        ${aqi}
        </div>

    </div>

    <div class="hourly">

    <h2 style="
    margin:22px 0;
    font-size:24px;
    background:
    linear-gradient(
    to right,
    #38bdf8,
    #facc15
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    ">
    48 Hour Forecast
    </h2>

    <div class="hour-list">

    ${hourlyHTML}

    </div>

    </div>

    <div class="forecast">

    <h2 style="
    margin:22px 0;
    font-size:24px;
    background:
    linear-gradient(
    to right,
    #38bdf8,
    #facc15
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    ">
    15 Day Forecast
    </h2>

    <div class="forecast-list">

    ${forecastHTML}

    </div>

    </div>

    <!-- WEATHER DETAILS -->

    <div class="forecast">

    <h2 style="
    margin:22px 0;
    font-size:24px;
    background:
    linear-gradient(
    to right,
    #38bdf8,
    #facc15
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    ">
    Weather Details
    </h2>

    <div class="info">

        <div class="card">
        🌅 Sunrise<br>
        ${sunrise}
        </div>

        <div class="card">
        🌇 Sunset<br>
        ${sunset}
        </div>

        <div class="card">
        🌡 Pressure<br>
        ${pressure} hPa
        </div>

        <div class="card">
        ⚠ Rain Alert<br>
        ${
            rainChance >= 70
            ? "Heavy Rain Expected"
            : "No Heavy Rain"
        }
        </div>

    </div>

    </div>

    <!-- ACTIVITIES -->

    <div class="activities">

    <h2 style="
    margin:25px 0;
    font-size:24px;
    background:
    linear-gradient(
    to right,
    #38bdf8,
    #facc15
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    ">
    Activities
    </h2>

    <div class="activity-grid">

    <div class="activity-card">
    🏃 Running<br>
    <span>Fair</span>
    </div>

    <div class="activity-card">
    🚶 Jogging<br>
    <span>Good</span>
    </div>

    <div class="activity-card">
    🚴 Cycling<br>
    <span>Fair</span>
    </div>

    <div class="activity-card">
    🥾 Hiking<br>
    <span>Poor</span>
    </div>

    </div>

    </div>

    <!-- ALLERGIES -->

    <div class="activities">

    <h2 style="
    margin:25px 0;
    font-size:24px;
    background:
    linear-gradient(
    to right,
    #38bdf8,
    #facc15
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    ">
    Allergies
    </h2>

    <div class="activity-grid">

    <div class="activity-card">
    🤧 Dust & Dander<br>
    <span>${allergy}</span>
    </div>

    <div class="activity-card">
    🌾 Pollen<br>
    <span>${allergy}</span>
    </div>

    </div>

    </div>
    `;
}

// Rain

function createRain(){

    const weatherEffect =
    document.getElementById("weatherEffect");

    weatherEffect.innerHTML = "";

    for(let i=0;i<120;i++){

        const rain =
        document.createElement("div");

        rain.classList.add("rain");

        rain.style.left =
        Math.random()*window.innerWidth+"px";

        rain.style.height =
        Math.random()*40+20+"px";

        rain.style.animationDuration =
        Math.random()*1+0.5+"s";

        weatherEffect.appendChild(rain);
    }
}

// Stars

function createStars(){

    const sky =
    document.getElementById("skyEffects");

    sky.innerHTML = "";

    for(let i=0;i<80;i++){

        const star =
        document.createElement("div");

        star.classList.add("star");

        star.style.left =
        Math.random()*window.innerWidth+"px";

        star.style.top =
        Math.random()*window.innerHeight+"px";

        star.style.animationDuration =
        Math.random()*3+1+"s";

        sky.appendChild(star);
    }
}

</script>

</body>

</html>
